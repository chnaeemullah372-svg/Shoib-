kind = "web"
previewPath = "/"
title = "Support Connect"
version = "1.0.0"
id = "artifacts/support-connect"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22057

[services.development]
run = "pnpm --filter @workspace/support-connect run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/support-connect", "run", "build" ]
publicDir = "artifacts/support-connect/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22057"
BASE_PATH = "/"
